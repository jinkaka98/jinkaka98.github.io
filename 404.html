<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Xixero</title>
    <meta name="description" content="The page you're looking for doesn't exist.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    
    <style>
        /* Future AGI Design System - 404 Page */
        :root {
            /* Typography */
            --font-primary: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            /* Colors */
            --color-text-primary: #fafafa;
            --color-text-secondary: #71717a;
            --color-text-tertiary: #a1a1aa;
            --color-surface-base: #000000;
            --color-surface-muted: #0a0a0a;
            --color-surface-card: #111111;
            --color-border: rgba(255, 255, 255, 0.07);
            --color-border-hover: rgba(255, 255, 255, 0.14);
            --color-accent: #8b5cf6;
            --color-accent-hover: #a78bfa;
            --color-accent-glow: rgba(139, 92, 246, 0.2);

            /* Spacing */
            --space-4: 8px;
            --space-7: 16px;
            --space-9: 24px;
            --space-10: 32px;
            --space-12: 48px;
            --space-16: 128px;

            /* Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-full: 9999px;

            /* Motion */
            --motion-fast: 200ms;
            --motion-normal: 300ms;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            font-size: 16px;
        }
        
        body {
            font-family: var(--font-primary);
            background: var(--color-surface-base);
            color: var(--color-text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Grid */
        .background-grid {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 1px 1px, rgba(139, 92, 246, 0.1) 1px, transparent 0);
            background-size: 40px 40px;
            animation: grid-move 20s linear infinite;
            z-index: 1;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* Background Glow */
        .background-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--color-accent-glow) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); }
        }
        
        .error-container {
            text-align: center;
            max-width: 600px;
            padding: var(--space-12);
            position: relative;
            z-index: 10;
        }
        
        .logo {
            font-family: var(--font-primary);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text-primary);
            letter-spacing: 0.05em;
            margin-bottom: var(--space-12);
            display: inline-block;
        }
        
        .error-code {
            font-family: var(--font-primary);
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 800;
            color: var(--color-accent);
            margin-bottom: var(--space-9);
            position: relative;
            display: inline-block;
        }
        
        .error-code::before {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            color: transparent;
            background: linear-gradient(45deg, var(--color-accent), var(--color-accent-hover));
            -webkit-background-clip: text;
            background-clip: text;
            animation: glitch 2s infinite;
        }
        
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            10% { transform: translate(-2px, -2px); }
            20% { transform: translate(2px, 2px); }
            30% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            70% { transform: translate(-2px, 2px); }
            80% { transform: translate(2px, -2px); }
            90% { transform: translate(-2px, -2px); }
        }
        
        .error-title {
            font-family: var(--font-primary);
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: var(--space-7);
            color: var(--color-text-primary);
        }
        
        .error-message {
            font-size: 1.125rem;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-16);
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: var(--space-9);
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-7);
            padding: var(--space-7) var(--space-10);
            border-radius: var(--radius-full);
            font-weight: 600;
            text-decoration: none;
            transition: all var(--motion-fast);
            cursor: pointer;
            border: none;
            font-size: 1rem;
            font-family: inherit;
        }
        
        .btn-primary {
            background: var(--color-accent);
            color: var(--color-surface-base);
            box-shadow: 0 4px 12px var(--color-accent-glow);
        }
        
        .btn-primary:hover {
            background: var(--color-accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--color-accent-glow);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--color-text-primary);
            border: 1px solid var(--color-border);
        }
        
        .btn-secondary:hover {
            background: var(--color-surface-muted);
            border-color: var(--color-border-hover);
            transform: translateY(-2px);
        }

        /* Focus Styles */
        *:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
            border-radius: var(--radius-sm);
        }
        
        @media (max-width: 768px) {
            .error-container {
                padding: var(--space-9);
            }
            
            .error-title {
                font-size: 1.5rem;
            }
            
            .error-message {
                font-size: 1rem;
            }
            
            .error-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            .background-grid {
                animation: none;
            }

            .background-glow {
                animation: none;
            }

            .error-code::before {
                animation: none;
            }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="background-glow"></div>
    
    <div class="error-container">
        <div class="logo">XIXERO</div>
        
        <div class="error-code">404</div>
        
        <h1 class="error-title">Page not found</h1>
        
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved.<br>
            Let's get you back to the gateway.
        </p>
        
        <div class="error-actions">
            <a href="/" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9,22 9,12 15,12 15,22"/>
                </svg>
                Back to home
            </a>
            
            <button onclick="history.back()" class="btn btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M19 12H5"/>
                    <path d="M12 19l-7-7 7-7"/>
                </svg>
                Go back
            </button>
        </div>
    </div>
</body>
</html>

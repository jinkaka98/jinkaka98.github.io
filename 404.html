<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/icon/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">
  <title>404 - Xixero</title>
  <style>
    :root {
      --c-bg: #06060b;
      --c-accent: #ff8c00;
      --c-text: #e8e4df;
      --c-dim: #3a3632;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--c-bg); color: var(--c-text);
      font-family: 'Geist Mono', monospace;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center;
    }
    .wrap { padding: 40px; }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 120px; font-weight: 800;
      background: linear-gradient(135deg, #ff8c00, #ff4500);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    p { color: var(--c-dim); margin: 16px 0 32px; font-size: 14px; }
    a {
      display: inline-block; padding: 14px 32px; border-radius: 10px;
      background: linear-gradient(135deg, #e07000, #c04000);
      color: #fff; text-decoration: none; font-size: 13px;
      font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      transition: all 0.3s;
    }
    a:hover { box-shadow: 0 0 40px rgba(255,120,0,0.3); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>PAGE NOT FOUND</p>
    <a href="/">RETURN HOME</a>
  </div>
</body>
</html>
